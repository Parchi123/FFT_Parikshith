<html>
    <head>
        <title>Forms</title>
        <style>
            h1{
                text-align: center;
                
            }
            form{
                border: 1px solid black;
                width: 400px;
                text-align: center;
                margin-left: 550px;
                border-radius: 10px;
                margin-top: 230px;
                background-color: palevioletred;
                box-shadow: 2px 2px 9px black   ;
            }
            .c1{
                margin-left: 20px;
                background-color: lightblue;
            }
            .c2{
                margin-left: 27px;
                background-color: lightblue;
            }
            .c3{
                margin-left: 2px;
                background-color: lightblue;
            }
            button{
                padding: 5px ;
                width: 80px ;
                background-color: rgb(23, 99, 124);
                border: none;
                border-radius: 5px;
            }
            button:hover{
                background-color: rgb(23, 99, 124);
                color: white;
            }
           
        </style>
    </head>
    <body>
        <form>
            <h1>Student login Form</h1>
            <label class="l1">uname:</label>
            <input type="text" class="c1" ><br><br>
            <label class="l2">email:</label>
            <input type="email" class="c2"><br><br>
            <label class="l3">password:</label>
            <input type="password" class="c3"><br><br>
            <button class="l4">Login</button><br><br>
        </form>
    </body>
</html>
